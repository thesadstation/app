<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সাইন আপ - The Sad Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #d81b60 0%, #880e4f 100%); font-family: 'Poppins', sans-serif; overflow: hidden; }
        
        .fade-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #880e4f; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; }
        .fade-active { opacity: 1; pointer-events: all; }
        
        .card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border: 2px solid rgba(255, 255, 255, 0.2); padding: 40px; border-radius: 35px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3); width: 85%; max-width: 400px; text-align: center; color: #ffffff; }
        .logo-container { width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 50%; overflow: hidden; border: 2px solid white; }
        #app-logo { width: 100%; height: 100%; object-fit: cover; }
        
        .brand-name { font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; color: #ffeb3b; }
        input { width: 100%; padding: 16px; margin: 10px 0; background: rgba(255, 255, 255, 0.9); border: none; border-radius: 30px; color: #333; font-weight: 500; box-sizing: border-box; outline: none; }
        
        .btn-signup { width: 100%; padding: 16px; margin-top: 20px; background-color: #333; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; display: flex; justify-content: center; align-items: center; }
        .btn-signup:disabled { background-color: #555; cursor: not-allowed; }
        
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .big-spinner { width: 40px; height: 40px; border: 5px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-bottom: 15px; }
        
        .link-text { margin-top: 20px; color: #eee; font-size: 14px; text-decoration: none; display: block; cursor: pointer; }
    </style>
</head>
<body>
    <div class="fade-overlay" id="fade-overlay">
        <div class="big-spinner" id="main-spinner"></div>
        <div id="status-msg" style="font-weight:bold; font-size: 20px;">অ্যাকাউন্ট তৈরি হচ্ছে...</div>
    </div>

    <div class="card">
        <div class="logo-container"><img id="app-logo" src="" alt="Logo"></div>
        <div class="brand-name">The Sad Station</div>
        <input type="text" id="fullname" placeholder="পুরো নাম">
        <input type="email" id="email" placeholder="ইমেইল অ্যাড্রেস">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        
        <button class="btn-signup" id="signup-btn">
            <span id="btn-text">সাইন আপ</span>
            <div id="loading-spinner" class="spinner"></div>
        </button>
        <a class="link-text" id="signin-link" href="signin.html">ইতিমধ্যে অ্যাকাউন্ট আছে? সাইন ইন করুন</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <script>
        const overlay = document.getElementById('fade-overlay');
        const spinner = document.getElementById('main-spinner');
        const statusMsg = document.getElementById('status-msg');

        window.addEventListener('load', async () => {
            const logoImg = document.getElementById('app-logo');
            try {
                const doc = await window.db.collection("site_branding").doc("site_branding").get();
                if (doc.exists && doc.data().logo_url) logoImg.src = doc.data().logo_url;
            } catch (e) { console.error("Logo error:", e); }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const btn = document.getElementById('signup-btn');
            const btnText = document.getElementById('btn-text');
            const loadingSpinner = document.getElementById('loading-spinner');
            
            const fullName = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!fullName || !email || !password) { alert("দয়া করে সব ঘর পূরণ করুন!"); return; }

            btn.disabled = true;
            btnText.style.display = "none";
            loadingSpinner.style.display = "block";
            overlay.classList.add('fade-active');

            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await window.db.collection("users").doc(userCredential.user.uid).set({ fullName, email, createdAt: new Date() });
                
                spinner.style.display = "none";
                statusMsg.innerText = "সফল হয়েছে!";
                
                setTimeout(() => { window.location.href = "signin.html"; }, 1500);
            } catch (error) {
                alert("ত্রুটি: " + error.message);
                btn.disabled = false;
                btnText.style.display = "block";
                loadingSpinner.style.display = "none";
                overlay.classList.remove('fade-active');
            }
        });

        document.getElementById('signin-link').addEventListener('click', (e) => {
            e.preventDefault();
            spinner.style.display = "block";
            statusMsg.innerText = "রিডাইরেক্ট হচ্ছে...";
            overlay.classList.add('fade-active');
            setTimeout(() => { window.location.href = 'signin.html'; }, 500);
        });
    </script>
</body>
</html>
