<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বাগতম - The Sad Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #d81b60 0%, #880e4f 100%); 
            font-family: 'Poppins', sans-serif; 
            text-align: center; overflow: hidden; color: #ffffff;
        }

        .fade-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #880e4f; z-index: 9999; pointer-events: none; 
            opacity: 0; transition: opacity 0.5s ease; 
        }
        .fade-active { opacity: 1; pointer-events: all; }

        .logo-container { 
            width: 130px; height: 130px; 
            border-radius: 50%; border: 3px solid white; 
            overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #app-logo { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { font-size: 28px; margin-bottom: 5px; }
        
        .brand-name { 
            font-size: 24px; font-weight: 700; letter-spacing: 2px; 
            text-transform: uppercase; color: #ffeb3b; margin-bottom: 40px; 
        }
        
        .btn-container { width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            padding: 16px; border-radius: 30px; text-decoration: none; 
            font-weight: bold; transition: 0.3s; cursor: pointer; font-size: 16px; 
        }
        .btn-signin { background-color: #ffffff; color: #880e4f; }
        .btn-signup { background-color: transparent; border: 2px solid white; color: white; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="fade-overlay" id="fade-overlay"></div>

    <div class="logo-container">
        <img id="app-logo" src="" alt="Logo">
    </div>
    
    <h1>স্বাগতম</h1>
    <div class="brand-name">The Sad Station</div>
    
    <div class="btn-container">
        <a href="signin.html" class="btn btn-signin">সাইন ইন</a>
        <a href="signup.html" class="btn btn-signup">সাইন আপ</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
        const overlay = document.getElementById('fade-overlay');

        window.addEventListener('load', async () => {
            const logoImg = document.getElementById('app-logo');
            try {
                const doc = await window.db.collection("site_branding").doc("site_branding").get();
                if (doc.exists && doc.data().logo_url) logoImg.src = doc.data().logo_url;
            } catch (error) { console.error("Logo error:", error); }
        });

        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                overlay.classList.add('fade-active');
                const url = button.getAttribute('href');
                setTimeout(() => { window.location.href = url; }, 500);
            });
        });
    </script>
</body>
</html>
