<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>আমার উইশলিস্ট | The Sad Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0d0d0d; font-family: 'Poppins', sans-serif; color: white; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #d81b60, #880e4f); padding: 25px 15px; text-align: center; border-radius: 0 0 25px 25px; }
        
        .brand-container { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #brand-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: none; }
        .brand-name { font-size: 20px; font-weight: 700; }

        .container { padding: 20px 15px; }
        .track-card { background: #1a1a1a; padding: 12px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #2a2a2a; }
        .thumb { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .track-info { flex-grow: 1; font-size: 14px; font-weight: 600; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #151515; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2a2a2a; z-index: 1001; }
        .nav-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: white; text-decoration: none; padding: 5px; }
        .nav-btn.active { color: #d81b60; border-top: 2px solid #d81b60; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand-container">
        <img id="brand-logo" src="" alt="Logo">
        <div class="brand-name">THE SAD STATION 🎵</div>
    </div>
</div>

<div class="container" id="wishlist-list">
    <p style="text-align:center; color: #888;">লোড হচ্ছে...</p>
</div>

<div class="nav-bar">
    <a href="home.html" class="nav-btn">🏠</a>
    <a href="wishlist.html" class="nav-btn active">❤️</a>
    <a href="blog.html" class="nav-btn">📝</a>
    <a href="profile.html" class="nav-btn">👤</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="config.js"></script>
<script src="wishlist.js"></script>
</body>
</html>
