<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sad Station</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
            /* স্ক্রিনশট অনুযায়ী ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট */
            background: linear-gradient(135deg, #d81b60 0%, #880e4f 100%);
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
        }
        
        .logo-container {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 3px solid white;
            margin-bottom: 20px;
        }
        
        #app-logo { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { 
            margin-top: 10px; 
            font-size: 22px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: #ffeb3b; /* স্ক্রিনশটের ব্র্যান্ড নামের কালার */
        }
        
        .loading-spinner {
            margin-top: 30px;
            width: 30px; height: 30px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="logo-container">
        <img id="app-logo" src="" alt="Logo">
    </div>
    <h1>The Sad Station</h1>
    <div class="loading-spinner"></div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="config.js"></script>
    <script src="splash.js"></script>
</body>
</html>
